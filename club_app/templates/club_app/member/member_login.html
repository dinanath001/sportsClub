<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />  
   <style>
    img{
        width: 600px;
        height: 40em;
        border: 2px;
        border-radius: 20%;
        border: thick double #1a9ccf;} 
    </style> 
   
    
    <style>
        body {
            background-image: url({% static 'club_app/images/stadium.jpg' %})
            
        }
        /* background-image{ width: 100px;
            height: 100px; } */
    </style>  
                 
</head>

<body>
    {% include 'club_app/common_files/common_header.html'%}
       
    
    {%if messages%}<!-- if exists -->
    {%for m in messages%}   
    
    
    <div class="alert alert-success alert-dismissible fade show" role="alert" style="width:50%;margin-left: 250px;margin-top:50px;">
      <strong>{{m}}</strong> 
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {%endfor%}
    
    {%endif%}  

    <div class="container-fluid m-auto">
        <div class="row">
            <div class="col-5">
                <img src="{%static 'club_app/images/football_coach.jpg' %}" class="rounded-bottom-circle"    alt="Responsive image" >
            </div>    
 
         <div class="col-2"></div>
         <div class="col-5">
              <h1 class="text-success text-center ">Login  Form</h1>
            <form action="/member_login/" method="post" class="needs-validation" novalidate>
                {% csrf_token %}
                
                 <div class="input-group mt-3">
                     <label for="email" class="input-group-text"><i class='fas fa-at'></i></label>
                     <input type="text" placeholder="Enter your Mail-id" class="form-control" name="id" required>
                     <div class="invalid-feedback">
                       Member id required
                     </div>
                 </div>
                 <div class="input-group mt-3">
                     <label for="password" class="input-group-text"><i class='fas fa-eye-slash'></i></label>
                     <input type="password" placeholder="Enter your Password" class="form-control" name="password" required>
                     <div class="invalid-feedback">
                        Member Password required
                      </div>
                 </div>
                
                 <div class="text-center mt-4">
                     <button type="Submit" class="btn btn-primary w-50">Submit </button>
                 </div>
                 <li>
                    <a href="/member_registration/"><br><b>Sign-Up</b><i style="font-size:26px;" class="fa">&#xf234;</i></a>
                 </li>
             </form>
         </div> 
 
        </div> 
     </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script> 
    <script src="{%static 'club_app/JS/validation.js'%}"></script> 
</body>
 </html>
