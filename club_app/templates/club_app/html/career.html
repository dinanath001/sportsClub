<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career</title>
    {% include 'club_app/common_files/common_css.html '%}
</head>
<body>
    
    <div class="main-body">
        {% include 'club_app/common_files/common_header.html' %}
        {%if messages%}<!-- if exists -->
        {%for m in messages%}   <!--  message list -->
        <!-- <h2>{{m}}</h2> -->
        
        <div class="alert alert-success alert-dismissible fade show" role="alert" style="width:50%;margin-left: 250px;margin-top:50px;">
          <strong>{{m}}</strong> 
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {%endfor%}
        
        {%endif%}
        <h1 style="text-align: center;">Choose your career with us</h1>
        <form enctype="multipart/form-data" method="post">
            {%csrf_token%} 
    <div style="display: flex; justify-content: center; flex-direction: column; align-items: center; background-color: blueviolet;">
        <div style="width: 40%;">
        {{form.as_p}} 

        <div class="text-center">

            <button type="submit" class="btn btn-danger w-50" class="text-center"> Submit </button>
       </div>    
    </div> 
    </div>
    </form>
    <!-- form tag close before main-body -->
    </div>
     {% include 'club_app/common_files/common_footer.html' %}
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
